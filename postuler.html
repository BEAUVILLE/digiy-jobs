<style>:root{--bg:#f6eedf;--ink:#10231b;--muted:#5f6f65;--green:#155f43;--green2:#1f7a55;--gold:#f4b934;--line:rgba(21,95,67,.17)}*{box-sizing:border-box}body{margin:0;min-height:100dvh;padding:16px;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 8% 0%,rgba(244,185,52,.28),transparent 35%),linear-gradient(180deg,#fff9ec,var(--bg))}main{width:min(760px,100%);margin:auto}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px}.top a{color:var(--green);font-weight:1000;text-decoration:none}.shell{padding:20px;border:1px solid var(--line);border-radius:28px;background:rgba(255,255,255,.76);box-shadow:0 20px 55px rgba(31,52,42,.13)}h1{margin:4px 0 8px;font-size:clamp(38px,8vw,68px);line-height:.94}.lead{color:var(--muted);font-weight:750;line-height:1.55}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.field{display:grid;gap:6px}.full{grid-column:1/-1}label{font-size:13px;font-weight:950;color:#294538}input,select,textarea{width:100%;min-height:49px;border:1px solid var(--line);border-radius:15px;background:#fff;padding:11px 12px;font:inherit;font-weight:800;color:var(--ink)}textarea{min-height:110px;resize:vertical}.btn{width:100%;min-height:54px;border:0;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;font:inherit;font-weight:1000;cursor:pointer}.status{margin-top:12px;padding:12px;border-radius:15px;background:rgba(244,185,52,.13);border:1px solid rgba(244,185,52,.28);font-weight:900;line-height:1.5}.status.ok{background:rgba(31,122,85,.10);border-color:rgba(31,122,85,.24);color:#155f43}.status.err{background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.20);color:#991b1b}.privacy{font-size:12px;color:var(--muted);line-height:1.5}@media(max-width:620px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.top{align-items:flex-start;flex-direction:column}}</style>

<body><main><div class="top"><b>💼 DIGIY JOBS</b><a href="./missions.html">Voir les missions</a></div><section class="shell"><h1>Postuler simplement.</h1><p class="lead">Ta candidature est enregistrée pour le recruteur de la mission choisie. Aucun code PIN n’est demandé au candidat.</p><form id="form" class="grid"><div class="field full"><label>Mission</label><select id="offer" required><option value="">Chargement des missions…</option></select></div><div class="field"><label>Nom et prénom</label><input id="name" required maxlength="80"></div><div class="field"><label>WhatsApp / téléphone</label><input id="phone" required inputmode="tel" maxlength="20"></div><div class="field"><label>Métier recherché</label><input id="job" required maxlength="100"></div><div class="field"><label>Ville</label><input id="city" required maxlength="100"></div><div class="field"><label>Pays</label><input id="country" value="Sénégal" maxlength="80"></div><div class="field"><label>Disponibilité</label><input id="availability" placeholder="Immédiate, week-end…" maxlength="100"></div><div class="field"><label>Expérience</label><input id="experience" placeholder="Débutant, 2 ans…" maxlength="100"></div><div class="field full"><label>Message</label><textarea id="message" maxlength="1000" placeholder="Ce que tu sais faire et ce que tu recherches."></textarea></div><div class="field full"><label class="privacy"><input id="consent" type="checkbox" required style="width:auto;min-height:auto"> J’autorise la transmission de ces informations au recruteur de la mission choisie.</label></div><div class="full"><button id="submit" class="btn" type="submit">Envoyer ma candidature</button></div></form><div id="status" class="status">Chargement des missions…</div></section></main>
<script>(async()=>{"use strict";const $=id=>document.getElementById(id);const sb=window.supabase.createClient(window.DIGIY_SUPABASE_URL,window.DIGIY_SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false}});const status=(t,c="")=>{$("status").textContent=t;$("status").className="status "+c};const wanted=new URLSearchParams(location.search).get("offer")||"";function isUuid(v){return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(v||""))}try{const {data,error}=await sb.rpc("digiy_jobs_public_offers");if(error)throw error;const rows=Array.isArray(data?.items)?data.items:[];$("offer").innerHTML='<option value="">Choisir une mission</option>'+rows.map(o=>`<option value="${String(o.id).replace(/"/g,"")}">${String(o.title||"Mission")} · ${String(o.city||"Ville")}</option>`).join("");if(isUuid(wanted)&&rows.some(o=>String(o.id)===wanted))$("offer").value=wanted;status(rows.length?"Choisis une mission puis complète ton profil.":"Aucune mission active pour le moment.",rows.length?"ok":"")}catch(e){status("Impossible de charger les missions.","err")}$("form").addEventListener("submit",async e=>{e.preventDefault();const offer=$("offer").value;if(!isUuid(offer)){status("Choisis une mission valide.","err");return}$("submit").disabled=true;status("Envoi de la candidature…");try{const {data,error}=await sb.rpc("digiy_jobs_public_apply",{p_offer_id:offer,p_full_name:$("name").value.trim(),p_phone:$("phone").value.trim(),p_job_title:$("job").value.trim(),p_city:$("city").value.trim(),p_country:$("country").value.trim()||"Sénégal",p_availability:$("availability").value.trim(),p_years_experience:$("experience").value.trim(),p_message:$("message").value.trim()});if(error)throw error;const result=Array.isArray(data)?data[0]:data;try{localStorage.setItem("digiy_jobs_last_application",JSON.stringify({offer_id:offer,reference:result?.reference||result?.ref||result?.id||"",status:result?.status||"new",submitted_at:new Date().toISOString()}))}catch(_){}status("✅ Candidature enregistrée. Le recruteur peut maintenant la voir dans PRO JOB.","ok");$("form").reset()}catch(err){status("Erreur : "+(err.message||"candidature impossible"),"err")}finally{$("submit").disabled=false}})})();</script></body></html>
